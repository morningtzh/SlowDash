# =============================================================
# SlowDash — Docker 镜像构建与推送
#
# 触发条件：
#   - push 到 main 分支 → 构建并推送 latest 标签
#   - 推送 v* tag → 构建并推送语义化版本标签
#   - 手动触发 (workflow_dispatch)
#
# 推送目标：ghcr.io (GitHub Container Registry)
# 认证方式：GITHUB_TOKEN（自动注入，无需额外配置）
# =============================================================
name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # github.repository 格式为 "owner/repo"，例如 "morningtzh/SlowDash"
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # 推送到 ghcr.io 需要 packages 写权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # main 分支 → latest
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # v1.2.3 → 1.2.3, 1.2
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 使用 GitHub Actions 缓存加速后续构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
