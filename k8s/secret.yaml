# =============================================================
# SlowDash Secret — 凭据与密钥（占位符模板）
#
# 使用方法：
#   kubectl create secret generic slowdash-secrets \
#     --namespace default \
#     --from-literal=CRED__weather__api_key="你的key" \
#     --from-literal=CRED__ai_balance__deepseek_key="你的key" \
#     --from-literal=CRED__ai_balance__aliyun_access_key="你的key" \
#     --from-literal=CRED__ai_balance__aliyun_secret_key="你的key" \
#     --from-literal=CRED__moviepilot__api_token="你的token" \
#     --from-literal=CRED__plex__token="你的token" \
#     --from-literal=CRED__weread__api_key="你的key" \
#     --from-literal=S3_ACCESS_KEY_ID="你的key" \
#     --from-literal=S3_SECRET_ACCESS_KEY="你的key"
# =============================================================
apiVersion: v1
kind: Secret
metadata:
  name: slowdash-secrets
  namespace: default
type: Opaque
stringData:
  # ── Widget 凭据 ──
  CRED__weather__api_key: "REPLACE_ME"
  CRED__ai_balance__deepseek_key: "REPLACE_ME"
  CRED__ai_balance__aliyun_access_key: "REPLACE_ME"
  CRED__ai_balance__aliyun_secret_key: "REPLACE_ME"
  CRED__moviepilot__api_token: "REPLACE_ME"
  CRED__plex__token: "REPLACE_ME"
  CRED__weread__api_key: "REPLACE_ME"

  # ── S3 凭据 ──
  S3_ACCESS_KEY_ID: "REPLACE_ME"
  S3_SECRET_ACCESS_KEY: "REPLACE_ME"
