# =============================================================
# SlowDash Deployment
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slowdash
  namespace: default
  labels:
    app: slowdash
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: slowdash
  template:
    metadata:
      labels:
        app: slowdash
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: slowdash
          image: ghcr.io/morningtzh/slowdash:docs-update-readme-usage
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
              name: http

          # --- 配置挂载 ---
          volumeMounts:
            - name: config
              mountPath: /etc/slowdash/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: cache
              mountPath: /app/output

          # --- 环境变量 ---
          env:
            # 刷新间隔（秒）
            - name: REFRESH_INTERVAL
              value: "300"
            - name: OUTPUT_DIR
              value: "/var/lib/slowdash/output"
            - name: ALWAYS_READY
              value: "true"
            - name: CONFIG_PATH
              value: "/etc/slowdash/config.yaml"

            # ── S3 凭据 (从 Secret 注入，覆盖 config.yaml 空值) ──
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: slowdash-secrets
                  key: S3_ACCESS_KEY_ID
                  optional: false
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: slowdash-secrets
                  key: S3_SECRET_ACCESS_KEY
                  optional: false

            # ── Widget 凭据 (CRED__ 前缀 → 合并到 config.credentials) ──
            - name: CRED__weather__api_key
              valueFrom:
                secretKeyRef:
                  name: slowdash-secrets
                  key: CRED__weather__api_key
                  optional: false
            - name: CRED__ai_balance__deepseek_key
              valueFrom:
                secretKeyRef:
                  name: slowdash-secrets
                  key: CRED__ai_balance__deepseek_key
                  optional: false
            - name: CRED__ai_balance__aliyun_access_key
              valueFrom:
                secretKeyRef:
                  name: slowdash-secrets
                  key: CRED__ai_balance__aliyun_access_key
                  optional: false
            - name: CRED__ai_balance__aliyun_secret_key
              valueFrom:
                secretKeyRef:
                  name: slowdash-secrets
                  key: CRED__ai_balance__aliyun_secret_key
                  optional: false
            - name: CRED__moviepilot__api_token
              valueFrom:
                secretKeyRef:
                  name: slowdash-secrets
                  key: CRED__moviepilot__api_token
                  optional: false
            - name: CRED__plex__token
              valueFrom:
                secretKeyRef:
                  name: slowdash-secrets
                  key: CRED__plex__token
                  optional: false
            - name: CRED__weread__api_key
              valueFrom:
                secretKeyRef:
                  name: slowdash-secrets
                  key: CRED__weread__api_key
                  optional: false

          # --- 存活探针 ---
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          # --- 就绪探针 ---
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5

          # --- 资源限制 ---
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"

      volumes:
        - name: config
          configMap:
            name: slowdash-config
        - name: cache
          emptyDir: {}
